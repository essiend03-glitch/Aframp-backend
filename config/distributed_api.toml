# Global Distributed API Configuration

[edge_cache]
# Default TTL for public data (seconds)
default_ttl = 300

# Stale-while-revalidate window (seconds)
stale_while_revalidate = 60

# Maximum cache size in bytes (100MB)
max_size = 104857600

# Enable compression for cached responses
enable_compression = true

[health_check]
# Health check interval (seconds)
interval = 10

# Health check timeout (seconds)
timeout = 5

# Number of failed checks before marking unhealthy
unhealthy_threshold = 3

# Number of successful checks before marking healthy
healthy_threshold = 2

[regions]
# Regional replica configurations

[regions.us_east]
region = "us-east-1"
db_read_replica_url = "postgres://read-replica-us-east:5432/bitmesh"
max_replication_lag_ms = 5000
health_check_interval = 10
request_timeout = 30

