[routing]
# Routing strategy: "latency-based", "anycast", or "geo-proximity"
strategy = "latency-based"

# Enable automatic failover
enable_failover = true

# Fallback region when all others are unhealthy
fallback_region = "us-east-1"

[cdn]
# CDN provider: "cloudflare", "cloudfront", or "custom"
provider = "cloudflare"

# CDN endpoint
endpoint = "https://cdn.bitmesh.io"

# Enable edge caching
enable_edge_cache = true

# Purge cache on deployment
purge_on_deploy = true
