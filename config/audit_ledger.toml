# Append-Only Audit Ledger Configuration

[audit_ledger]
# Enable audit ledger
enabled = true

# Hardware signature (auto-detected if not specified)
# Format: hostname:pod_name
# hardware_signature = "server1:pod1"

[stellar_anchor]
# Enable Stellar blockchain anchoring
enabled = true

# Stellar Horizon server URL
# Use testnet for development, public for production
horizon_url = "https://horizon-testnet.stellar.org"
# horizon_url = "https://horizon.stellar.org"  # Production

# Network passphrase
# Testnet: "Test SDF Network ; September 2015"
# Public: "Public Global Stellar Network ; September 2015"
network_passphrase = "Test SDF Network ; September 2015"

# Source account secret key for submitting anchor transactions
# IMPORTANT: Store this securely (use environment variable in production)
# Generate a testnet account at: https://laboratory.stellar.org/#account-creator
source_secret = "${STELLAR_ANCHOR_SECRET}"

# Destination account for anchor transactions (optional)
# If not specified, anchors are sent to self
# destination_account = "GABC..."

# Interval between anchor submissions (in seconds)
# Default: 3600 (1 hour)
# Recommended: 3600-86400 (1 hour to 1 day)
anchor_interval_seconds = 3600

# Base fee for Stellar transactions (in stroops)
# 1 stroop = 0.0000001 XLM
# Default: 100 stroops = 0.00001 XLM
base_fee = 100

[monitoring]
# Enable chain verification checks
enable_verification = true

# Interval for automatic chain verification (in seconds)
# Default: 86400 (24 hours)
verification_interval_seconds = 86400

# Alert on verification failures
alert_on_verification_failure = true

# Alert on anchor submission failures
alert_on_anchor_failure = true

[retention]
# Data retention policy (in days)
# Set to 0 for infinite retention
# Note: WORM enforcement prevents deletion, but this can be used for archival
retention_days = 2555  # 7 years (common financial regulation requirement)

# Archive old entries to cold storage
enable_archival = false

# Archival threshold (in days)
archival_threshold_days = 365

[performance]
# Maximum concurrent append operations
max_concurrent_appends = 1000

# Connection pool size for audit ledger
pool_size = 20

# Query timeout (in seconds)
query_timeout_seconds = 30

[compliance]
# Compliance framework
framework = "ISO27001,SOC2,PCI-DSS"

# Audit log retention requirement (in years)
retention_years = 7

# Enable forensic mode (captures additional metadata)
forensic_mode = true

# Redact sensitive data in logs
redact_sensitive_data = true

# Sensitive fields to redact (comma-separated)
sensitive_fields = "password,secret,token,api_key,private_key"
