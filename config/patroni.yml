# Patroni configuration for Aframp HA PostgreSQL cluster (Issue #347)
#
# Deploy one patroni.yml per node; override `name` and `connect_address`
# via environment variables (PATRONI_NAME, PATRONI_CONNECT_ADDRESS).
#
# Patroni docs: https://patroni.readthedocs.io/

scope: aframp-pg-cluster
namespace: /aframp/
name: ${PATRONI_NAME:-pg-node-1}

restapi:
  listen: 0.0.0.0:8008
  connect_address: ${PATRONI_CONNECT_ADDRESS:-127.0.0.1:8008}

etcd3:
  hosts: ${ETCD_HOSTS:-127.0.0.1:2379}

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576   # 1 MB — tight lag window for near-zero RTO
    synchronous_mode: true             # Synchronous replication on primary shard
    synchronous_mode_strict: false     # Allow async fallback if no sync replica available
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_log_hints: "on"
        # Synchronous commit for primary — guarantees durability on commit
        synchronous_commit: "on"
        # Async replicas (read replicas) listed in synchronous_standby_names
        # are excluded so they don't block writes
        synchronous_standby_names: "FIRST 1 (*)"

  initdb:
    - encoding: UTF8
    - data-checksums          # Enable page-level checksums for replica integrity

  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

  users:
    aframp:
      password: ${DB_PASSWORD}
      options:
        - createrole
        - createdb
    replicator:
      password: ${REPLICATION_PASSWORD}
      options:
        - replication

postgresql:
  listen: 0.0.0.0:5432
  connect_address: ${PATRONI_PG_CONNECT_ADDRESS:-127.0.0.1:5432}
  data_dir: /var/lib/postgresql/data
  bin_dir: /usr/lib/postgresql/15/bin
  pgpass: /tmp/pgpass

  authentication:
    replication:
      username: replicator
      password: ${REPLICATION_PASSWORD}
    superuser:
      username: postgres
      password: ${POSTGRES_PASSWORD}
    rewind:
      username: rewind_user
      password: ${REWIND_PASSWORD}

  parameters:
    max_connections: 500
    shared_buffers: 256MB
    effective_cache_size: 1GB
    work_mem: 4MB
    maintenance_work_mem: 64MB
    checkpoint_completion_target: 0.9
    wal_buffers: 16MB
    default_statistics_target: 100

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
