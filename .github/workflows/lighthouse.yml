name: Lighthouse CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit (90+ all categories)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lighthouse-test-app/package.json

      - name: Install dependencies
        working-directory: lighthouse-test-app
        run: npm ci

      - name: Validate lighthouserc.json and HTML quality
        working-directory: lighthouse-test-app
        run: node lighthouse.test.js

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.0

      # Serve the static dist on port 3000 in the background
      - name: Serve test app
        working-directory: lighthouse-test-app
        run: npx serve dist -p 3000 -s &
        env:
          CI: "true"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 > /dev/null && echo "Server ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ github.run_number }}
          path: .lighthouseci/
          retention-days: 30
